<!DOCTYPE html>
<html>
<head>
<title>Dependency-Guard | Security Dashboard</title>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at 20% 20%,#0a0f1c,#020617 70%);
color:#e2e8f0;
overflow-x:hidden;
animation:fadeIn 0.6s ease-in;
}

/* ===== GLOW BACKGROUND ===== */
body::before,
body::after{
content:"";
position:fixed;
width:450px;
height:450px;
border-radius:50%;
filter:blur(140px);
z-index:-1;
animation:floatGlow 6s infinite alternate ease-in-out;
}

body::before{
background:rgba(0,255,157,0.25);
top:-100px;
left:-100px;
}

body::after{
background:rgba(0,195,255,0.25);
bottom:-120px;
right:-120px;
}

@keyframes floatGlow{
from{ transform:translateY(0px);}
to{ transform:translateY(40px);}
}

/* ===== FADE ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== HEADER ===== */
.header{
padding:25px 50px;
font-size:22px;
font-weight:600;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(0,255,157,0.4);
box-shadow:0 0 15px rgba(0,255,157,0.3);
animation:glowPulse 2s infinite alternate;
}

/* ===== NAVBAR ===== */
.topbar{
display:flex;
justify-content:center;
gap:60px;
padding:15px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
}

.topbar a{
color:#e2e8f0;
text-decoration:none;
font-weight:600;
position:relative;
transition:0.3s;
}

.topbar a:hover{
color:#00ff9d;
text-shadow:0 0 10px #00ff9d;
}

/* ===== CONTAINER ===== */
.container{
padding:50px;
}

/* ===== GLASS ===== */
.glass{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:30px;
border:1px solid rgba(0,255,157,0.3);
box-shadow:0 0 25px rgba(0,255,157,0.25);
backdrop-filter:blur(20px);
}

/* ===== SCAN GRID ===== */
.scan-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* ===== SCAN BOX ===== */
.scan-box{
background:rgba(255,255,255,0.06);
border-radius:18px;
padding:25px;
text-align:center;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* GLOW BORDER EFFECT */
.scan-box::before{
content:"";
position:absolute;
inset:0;
border-radius:18px;
padding:1px;
background:linear-gradient(120deg,#00ff9d,#00c3ff);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
opacity:0;
transition:0.3s;
}

.scan-box:hover::before{
opacity:1;
}

.scan-box:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 30px rgba(0,255,157,0.6);
}

/* ===== INPUT ===== */
.scan-box input{
width:90%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,0,0,0.4);
color:white;
margin-bottom:15px;
transition:0.3s;
}

.scan-box input:focus{
outline:none;
box-shadow:0 0 10px #00ff9d;
border-color:#00ff9d;
}

/* ===== BUTTON ===== */
.scan-box button{
width:100%;
padding:10px;
background:linear-gradient(90deg,#00ff9d,#00c3ff);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.scan-box button:hover{
transform:scale(1.07);
box-shadow:0 0 20px #00ff9d;
}

/* ===== SUMMARY ===== */
.summary{
display:flex;
gap:20px;
margin-bottom:25px;
}

.summary-box{
flex:1;
padding:20px;
border-radius:15px;
text-align:center;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.summary-box:hover{
transform:translateY(-6px);
box-shadow:0 0 20px rgba(0,255,157,0.5);
}

/* ===== RESULT CARD ===== */
.result-card{
background:rgba(255,255,255,0.07);
border-radius:20px;
padding:28px;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
animation:fadeIn 0.4s ease-in-out;
}

.result-card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(0,255,157,0.6);
}

/* ===== BADGE ===== */
.risk-badge{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
animation:glowPulse 2s infinite alternate;
}

/* ===== TARGET ===== */
.target-box{
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
color:#00c3ff;
font-family:monospace;
margin-top:5px;
box-shadow:0 0 10px rgba(0,195,255,0.4);
}

/* ===== GLOW ANIMATION ===== */
@keyframes glowPulse{
from{box-shadow:0 0 5px rgba(0,255,157,0.3);}
to{box-shadow:0 0 20px rgba(0,255,157,0.8);}
}

.empty-state{
text-align:center;
opacity:0.6;
margin-top:40px;
}

</style>
</head>

<body>

<div class="header">
🔐 Dependency-Guard — Threat Intelligence Platform
</div>

<div class="topbar">
<a href="/">Dashboard</a>
<a href="/phishing">Phishing Scan</a>
<a href="/breach">Breach Checker</a>
</div>

<div class="container">

<div class="glass">

<form method="POST" enctype="multipart/form-data">

<div class="scan-grid">

<div class="scan-box">
<h3>📄 Dependency File Scan</h3>
<input type="file" name="file" accept=".txt,.json,.xml">
<button type="submit">Scan Dependencies</button>
</div>

<div class="scan-box">
<h3>🌐 URL Scan</h3>
<input type="text" name="url" placeholder="Enter URL">
<button type="submit">Scan URL</button>
</div>

<div class="scan-box">
<h3>🔑 Hash Scan</h3>
<input type="text" name="hash" placeholder="Enter MD5 / SHA256 Hash">
<button type="submit">Scan Hash</button>
</div>

</div>

</form>

</div>

</div>

</body>
</html>
